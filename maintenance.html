<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#006233" />
    
    <!-- SEO Optimization -->
    <title>STARTUDE DZ 4.0 | الموقع تحت الصيانة</title>
    <meta name="description" content="الموقع تحت الصيانة حالياً. سنعود قريباً." />
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      body {
        background-color: #0a0f16 !important;
        color: #f0f4f8;
      }
    </style>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>

    <div class="app-container" style="display: flex; flex-direction: column; min-height: 100vh; justify-content: space-between;">
      
      <!-- Minimal Navbar for Maintenance -->
      <header class="navbar-container glass-panel">
        <div class="navbar-content">
          <div class="logo">
            <div style="display: flex; align-items: center; gap: 0.8rem;">
              <img src="./startude-logo.png" alt="STARTUDE Logo" style="height: 40px; width: auto; object-fit: contain;" />
              <h2>STARTUDE DZ <span>🚀</span></h2>
            </div>
          </div>

          <div class="nav-actions">
            <button class="lang-toggle btn-secondary">
              <i class="fas fa-globe"></i> <span class="lang-toggle-text">EN</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div class="container">
          <div class="maintenance-container">
            <div class="maintenance-panel glass-panel">
              <div style="font-size: 5rem; margin-bottom: 2rem; display: inline-block; animation: pulse 2s infinite;">🛠️</div>
              <h1 class="text-gradient" data-i18n="maintenance.title" style="font-size: 2.5rem; margin-bottom: 1.5rem;">الموقع تحت الصيانة</h1>
              <p style="font-size: 1.25rem; color: var(--color-text-muted); margin-bottom: 2.5rem; line-height: 1.8;" data-i18n="maintenance.subtitle">
                نحن نعمل حالياً على تحسين وتحديث المنصة لتقديم أفضل تجربة ممكنة. سنعود قريباً!
              </p>
              <div style="font-size: 1.1rem; color: var(--color-primary-light); font-weight: 700; letter-spacing: 1px;" data-i18n="maintenance.back_soon">
                سنعود قريباً...
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer-container glass-panel">
        <div class="container footer-content" style="justify-content: center; text-align: center;">
          <div class="footer-brand" style="grid-column: 1 / -1;">
            <h2>STARTUDE DZ <span>🚀</span></h2>
            <p data-i18n="footer.onel">المنظمة الوطنية للطلبة الأحرار (ONEL)</p>
          </div>
        </div>
        <div class="footer-bottom">
          <p data-i18n="footer.copyright">© 2026 STARTUDE DZ – جميع الحقوق محفوظة</p>
        </div>
      </footer>

    </div>

    <!-- Scripts -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
